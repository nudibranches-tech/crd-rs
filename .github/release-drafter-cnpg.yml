name-template: 'cnpg@$RESOLVED_VERSION'
tag-template: 'cnpg@$RESOLVED_VERSION'
tag-prefix: cnpg@
template: |
  ## What's Changed

  $CHANGES
include-paths:
  - "crates/cnpg"
  - "crds/cnpg"
categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
      - 'maintenance'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
no-changes-template: '* No changes'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch
