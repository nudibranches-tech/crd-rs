name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  K8S_OPENAPI_ENABLED_VERSION: "1.32"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings
